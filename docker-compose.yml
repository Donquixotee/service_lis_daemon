services:
  lis-daemon:
    build: .
    container_name: lis-daemon
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "0.0.0.0:5001:5001"   # BS-240Pro (biochemistry)
      - "0.0.0.0:5002:5002"   # BC-780 (hematology)
      - "0.0.0.0:5003:5003"   # CL-1200i (immunology)
    volumes:
      - ./config:/app/config:ro
    networks:
      - lis_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  lis_net:
    # Dev:  DOCKER_NETWORK_EXTERNAL=false  (isolated bridge, daemon can't reach Odoo)
    # Prod: DOCKER_NETWORK_EXTERNAL=true   (joins alwahab_network, reaches Odoo container)
    external: ${DOCKER_NETWORK_EXTERNAL:-false}
    name: ${DOCKER_NETWORK:-lis_network}
