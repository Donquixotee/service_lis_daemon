services:
  lis-daemon:
    build: .
    container_name: lis-daemon
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Machine result ports — one per machine
      # Add more as needed: '${LIS_PORT_N}:${LIS_PORT_N}'
      - "${LIS_PORT_1:-5001}:${LIS_PORT_1:-5001}"
      - "${LIS_PORT_2:-5002}:${LIS_PORT_2:-5002}"
    volumes:
      # Mount config for live edits without rebuilding
      - ./config:/app/config:ro
    networks:
      - lis_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  lis_net:
    # Dev: DOCKER_NETWORK_EXTERNAL=false (creates a local bridge network)
    # Prod: DOCKER_NETWORK_EXTERNAL=true, DOCKER_NETWORK=alwahab_network (joins Odoo's network)
    external: ${DOCKER_NETWORK_EXTERNAL:-false}
    name: ${DOCKER_NETWORK:-lis_network}
