# ============================================================
# LIS Daemon — HL7 Configuration
# ============================================================

daemon:
  # TCP ports the daemon listens on
  listen_ports:
    - 5001
    - 5002
    - 5003

  # How often to reload machine config from Odoo (seconds)
  machine_refresh_interval: 300

  # TCP connection settings
  tcp:
    receive_timeout: 60     # seconds to wait for next MLLP frame before closing
    buffer_size: 65536      # bytes per TCP read

  # Odoo XML-RPC retry settings
  odoo_rpc:
    max_retries: 3
    retry_delay: 2          # seconds between retries
    timeout: 30             # seconds per RPC call

# ============================================================
# HL7 v2.x Field Positions
# ============================================================
# Standard HL7 positions — only change if Mindray firmware
# deviates from the HL7 v2.3 standard.
# ============================================================

hl7:
  field_separator: "|"
  component_separator: "^"
  repeat_separator: "~"

  # OBR segment — where to find the sample barcode (LS###)
  obr:
    placer_order_field: 2   # OBR-2: Placer Order Number
    filler_order_field: 3   # OBR-3: Filler Order Number (preferred)

  # OBX segment — result fields
  obx:
    obs_id_field: 3         # OBX-3: Observation Identifier  e.g. "WBC^GB^"
    value_field: 5          # OBX-5: Observation Value       e.g. "7.2"
    units_field: 6          # OBX-6: Units                   e.g. "10*3/uL"
    ref_range_field: 7      # OBX-7: Reference Range         e.g. "4.0-11.0"
    abnormal_flag_field: 8  # OBX-8: Abnormal Flags          N / H / L / HH / LL
